name: diffcsp-agent
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - uv

  - pip:
    - pymatgen
    - ase
    - pyxtal
    - hydra-core==1.3.2
    - omegaconf==2.3.0
    - pytorch-lightning==2.0.3
    - chemparse
    - p-tqdm
    - python-dotenv
    - smact
    - matminer
    - einops
    - torchdiffeq
    - scikit-learn
    - wandb

  # CRITICAL: torch, torch-geometric, torch-scatter require manual installation
  # See README.md for detailed instructions
