name: ms-gen
channels:
  - pytorch
  - dglteam
  - conda-forge
  - pyg
  - defaults
dependencies:
  - python=3.8
  - cython
  - matplotlib=3.4.*
  - rdkit=2021.03.*
  - conda-forge::python-graphviz=0.17
  - conda-forge::pygraphviz=1.7
  - pytorch-lightning=1.6.*
  - pip=21.2.*
  - pytorch::pytorch=1.9.1=py3.8_cuda11.1_cudnn8.0.5_0
  - cudatoolkit=11.1
  - einops
  - seaborn=0.11.*
  - pytorch-scatter
  - pytorch-sparse
  - pyg
  - dgl-cuda11.1=0.8.2
  - h5py
  - pip:
    - scikit-learn
    - pathos
    - "setuptools==59.5.0"
    - CairoSVG
    - omegaconf
    - pubchempy
    - pygmtools
    - msbuddy
    - lightgbm
    - platformdirs
    - pyyaml
