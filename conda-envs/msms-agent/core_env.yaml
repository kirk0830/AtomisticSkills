name: ms-gen
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - cython
  - matplotlib
  - conda-forge::rdkit
  - conda-forge::python-graphviz
  - conda-forge::pygraphviz
  - conda-forge::pytorch=2.4.0
  - pip
  - einops
  - seaborn
  - h5py
  - pip:
    - pytorch-lightning
    - "ray[tune]==2.7.2"
    - "setuptools<81"
    - ipython
    - pydantic
    - scikit-learn
    - pathos
    - CairoSVG
    - omegaconf
    - pubchempy
    - pygmtools
    - msbuddy
    - lightgbm
    - platformdirs
    - pyyaml
