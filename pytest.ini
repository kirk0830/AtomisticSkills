# Pytest Configuration for Multi-Environment Testing
# This project has multiple MCP servers requiring different conda environments.
# Use markers to run test subsets in their respective environments.

[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers for environment-specific tests
markers =
    base: Tests for base utilities (run in base-agent environment)
    mace: Tests requiring mace-agent conda environment
    matgl: Tests requiring matgl-agent conda environment
    fairchem: Tests requiring fairchem-agent conda environment
    atomate2: Tests requiring atomate2-agent conda environment
    integration: Full workflow integration tests (slow, may require multiple envs)
    
# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    
# Ignore patterns
norecursedirs = .git .tox build dist *.egg .agents research

# Timeout for tests (in seconds)
# timeout = 300
