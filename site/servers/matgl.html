<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>matgl Server Tools — AtomisticSkills</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{ --bg:#f8f9fc; --bg2:#ffffff; --border:#e2e8f0; --text:#1b1464; --muted:#64748b; --accent:#816cff; }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:0.88rem;font-weight:500;transition:color .2s}
    .nav-back:hover{color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .gh-link{font-size:0.84rem;font-weight:600;color:var(--accent);text-decoration:none;
      border:1px solid var(--accent);border-radius:8px;padding:6px 14px;transition:all .2s}
    .gh-link:hover{background:var(--accent);color:#fff}
    .hero{background:var(--bg2);border-bottom:1px solid var(--border);padding:3rem 2rem 2.5rem}
    .hero-inner{max-width:900px;margin:0 auto}
    .breadcrumb{font-size:0.82rem;color:var(--muted);margin-bottom:1rem}
    .breadcrumb a{color:var(--accent);text-decoration:none}
    h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;line-height:1.15;color:var(--text);margin-bottom:0.75rem}
    .desc{font-size:1.05rem;color:var(--muted);max-width:720px;line-height:1.6}
    .content{max-width:900px;margin:0 auto;padding:2.5rem 2rem}
    .tool-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .tool-name { font-size: 1.25rem; font-weight: 700; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1rem; font-family: 'JetBrains Mono', monospace; }
    .rendered-md h2{font-size:1.35rem;font-weight:700;margin:2rem 0 1rem;color:var(--text);border-bottom:2px solid var(--border);padding-bottom:0.5rem}
    .rendered-md h3{font-size:1.15rem;font-weight:700;margin:1.5rem 0 0.5rem;color:var(--text)}
    .rendered-md p{margin:0.8rem 0;color:#374151;line-height:1.7}
    .rendered-md ul,.rendered-md ol{padding-left:1.5rem;margin:0.8rem 0}
    .rendered-md li{margin:0.4rem 0;color:#374151}
    .rendered-md code{font-family:'JetBrains Mono',monospace;font-size:0.85rem;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:5px;padding:2px 6px;color:#be185d}
    .rendered-md pre{background:#f8fafc;padding:1.25rem;border-radius:8px;border:1px solid #e2e8f0;overflow-x:auto;margin:1rem 0}
    .rendered-md pre code{background:transparent;padding:0;border:none;color:#334155;font-size:0.9rem;line-height:1.6}
    .rendered-md a{color:var(--accent);text-decoration:none}
    footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--muted);font-size:0.85rem}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="../index.html"><img src="../logo/atomisticskills_logo.svg" height="24" alt="AtomisticSkills"/></a>
  <a class="nav-back" href="../index.html">← Back to Home</a>
  <div class="nav-right">
    <a class="gh-link" href="https://github.com/bowen-bd/AtomisticSkills/tree/main/src/mcp_server/matgl_server.py" target="_blank">View on GitHub</a>
  </div>
</nav>
<div class="hero">
  <div class="hero-inner">
    <div class="breadcrumb"><a href="../index.html">Home</a> / Servers</div>
    <h1>matgl Server</h1>
    <p class="desc">MCP Tools exposed by the <code>matgl_server.py</code></p>
  </div>
</div>
<div class="content">
  <div class="tools-list">
    
        <div class="tool-card">
          <h3 class="tool-name">📎 load_model</h3>
          <div class="tool-doc rendered-md" data-md='"```text\nLoad a MatGL model.\n\nSupported models include:\n- PES Models: &#39;CHGNet-MatPES-PBE-2025.2.10-2.7M-PES&#39;, &#39;CHGNet-MatPES-r2SCAN-2025.2.10-2.7M-PES&#39;, &#39;CHGNet-MPtrj-2024.2.13-11M-PES&#39;, &#39;CHGNet-MPtrj-2023.12.1-2.7M-PES&#39;\n- PES Models: &#39;M3GNet-MP-2021.2.8-PES&#39;, &#39;M3GNet-MatPES-PBE-v2025.1-PES&#39;, &#39;M3GNet-MatPES-r2SCAN-v2025.1-PES&#39;, &#39;M3GNet-MP-2021.2.8-DIRECT-PES&#39;\n- PES Models: &#39;TensorNet-MatPES-PBE-v2025.1-PES&#39;, &#39;TensorNet-MatPES-r2SCAN-v2025.1-PES&#39;, &#39;M3GNet-ANI-1x-Subset-PES&#39;, &#39;SO3Net-ANI-1x-Subset-PES&#39;\n\nArgs:\n    model_name: Name of the model to load.\n    device: Device to use (\"auto\", \"cpu\", \"cuda\").\n    \nReturns:\n    Confirmation message.\n\nCRITICAL: This tool must be called before using any other tool (except predict_bandgap) to load the model into memory.\n```"'></div>
        </div>
        
        <div class="tool-card">
          <h3 class="tool-name">📎 predict_structure</h3>
          <div class="tool-doc rendered-md" data-md='"```text\nPredict energy and forces for a structure or a batch of structures.\n\nArgs:\n    structure_data: Single structure or batch (directory path, list of dicts/paths).\n\nReturns:\n    Dictionary containing:\n    - \"energy\": Total potential energy (eV)\n    - \"forces\": Atomic forces (eV/A)\n    - \"stress\": (Optional) Stress tensor in eV/\u00c5\u00b3\n    - \"charges\": (Optional) Atomic charges if supported (e.g., CHGNet)\n```"'></div>
        </div>
        
        <div class="tool-card">
          <h3 class="tool-name">📎 predict_atomic_features</h3>
          <div class="tool-doc rendered-md" data-md='"```text\nPredict atomic latent features (descriptors) for a structure.\nAutomatically saves features to the current research directory.\n\nArgs:\n    structure_data: Single structure or batch (directory path, list of dicts/paths).\n    output_path: Optional custom path for saving features. If not provided, auto-generates\n                 based on structure filename (e.g., &#39;solid.cif&#39; -> &#39;solid_features.json&#39;).\n\nReturns:\n    Dict: {\n        &#39;atomic_features&#39;: [[...], ...], \n        &#39;feature_dim&#39;: int, \n        &#39;num_atoms&#39;: int,\n        &#39;saved_path&#39;: str  # Path to saved JSON file\n    }\n```"'></div>
        </div>
        
        <div class="tool-card">
          <h3 class="tool-name">📎 predict_bandgap</h3>
          <div class="tool-doc rendered-md" data-md='"```text\nPredict the bandgap for a structure using MEGNet.\nUses an isolated model instance to avoid conflicts with PES calculations.\n\nArgs:\n    structure_data: Single structure or batch (directory path, list of dicts/paths).\n\nReturns:\n    Dictionary containing \"bandgap\" in eV.\n```"'></div>
        </div>
        
        <div class="tool-card">
          <h3 class="tool-name">📎 get_info</h3>
          <div class="tool-doc rendered-md" data-md='"```text\nGet information about the current loaded model.\n```"'></div>
        </div>
        
        <div class="tool-card">
          <h3 class="tool-name">📎 relax_structure</h3>
          <div class="tool-doc rendered-md" data-md='"```text\nRelax one or multiple structures using the loaded MatGL model.\n\nArgs:\n    structure_data: Single structure or batch (directory path, list of dicts/paths).\n    fmax: Force convergence criterion (eV/Ang).\n    steps: Maximum number of optimization steps.\n    optimizer: Optimizer to use (\"FIRE\", \"BFGS\", \"LBFGS\").\n    relax_cell: Whether to relax the unit cell.\n    output_dir: Directory to save results. For batch mode, each structure gets a subdirectory.\n    \nReturns:\n    For single: Dict with energy, trajectory_path, cif_path, json_path\n    For batch: Dict with mode=\"batch\", total_structures, successful, failed, results list\n```"'></div>
        </div>
        
        <div class="tool-card">
          <h3 class="tool-name">📎 run_md</h3>
          <div class="tool-doc rendered-md" data-md='"```text\nRun molecular dynamics simulation using MatCalc.\n\nArgs:\n    structure_data: Single structure or batch (directory path, list of dicts/paths).\n    log_interval: Interval for logging to trajectory and logfile.\n    pressure: Target pressure in bar (for NPT).\n    pressure_mask: Mask for anisotropic NPT (e.g., [1, 0, 0] for 1D).\n    output_dir: Directory to save results.\n    monitor: Whether to enable automatic MD monitoring.\n    monitor_type: Type of monitor (\"melting\", \"explosion\", \"overshoot\", \"volume\") or list of types.\n    monitor_params: Optional dictionary of parameters for the monitors (e.g., {\"upper_limit_ratio\": 4.0}).\n    supercell_min_length: Minimum length (\u00c5) for each lattice vector. Automatically expands supercell.\nReturns:\n    Dictionary with MD results (trajectory_path, final_structure).\n```"'></div>
        </div>
        
  </div>
</div>
<footer><p>AtomisticSkills — Open-sourced AI research infrastructure</p></footer>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    marked.setOptions({ breaks: true, gfm: true });
    document.querySelectorAll('.tool-doc').forEach(el => {
        try {
            // We encoded it with json.dumps(), so we parse with JSON.parse.
            const rawHtmlStr = el.dataset.md;
            // The unescaped string can be parsed back:
            const md = JSON.parse(rawHtmlStr.replace(/&#39;/g, "'"));
            el.innerHTML = marked.parse(md);
        } catch(e) {
            el.innerText = el.dataset.md;
        }
    });
  });
</script>
</body>
</html>
