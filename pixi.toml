# AtomisticSkills Pixi Configuration
#
# This configuration replaces the conda-envs/*/install.sh approach with
# a declarative, reproducible, and isolated environment management system.
#
# Key improvements over Conda:
# 1. No brutal env remove/create - incremental updates
# 2. Environments isolated in .pixi/envs/ - no PATH pollution
# 3. Lockfile (pixi.lock) ensures reproducibility
# 4. Tasks replace shell scripts
# 5. Multiple environments in one workspace
#
# Hierarchy:
#   Layer 0  core            — pymatgen, ase, numpy, atomistic-skills, mcp
#   Layer 1  base-{dft,ml,md,chem} — domain foundations
#   Layer 2  engine-{name}   — computational backends (ORCA, MACE, CP2K, …)
#   Layer 3  feat-{name}     — property tools (phonon, diffusion, …)
#   Layer 4  environments    — full environments with disk estimates

[workspace]
name = "atomistic-skills"
description = "AI-driven atomistic materials research framework"
authors = ["AtomisticSkills Team"]
channels = ["conda-forge"]
platforms = ["linux-64"]
# Note: Some environments (orca, CUDA) are platform-specific

# -----------------------------------------------------------------------------
# PyPI Options
# -----------------------------------------------------------------------------
# Default index: Tsinghua mirror (faster in mainland China).
# extra-index-urls includes PyTorch CUDA 11.8 wheels required ONLY by
# mattergen (torch==2.2.1+cu118).  Other environments use conda-forge
# pytorch and are unaffected — the cu118 index only offers packages that
# explicitly request +cu118 suffixes, so it won't replace conda pytorch.
# find-links points to locally downloaded PyG wheels because uv cannot
# fetch https://data.pyg.org from this network (TLS handshake issue).
[pypi-options]
index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"
extra-index-urls = ["https://download.pytorch.org/whl/cu118"]
find-links = [{ path = ".pixi/wheels/pyg-cu118" }]


# =============================================================================
# LAYER 0 — CORE
# Shared base dependencies for ALL environments.  ~2 GB
# =============================================================================

[feature.core.dependencies]
python = ">=3.10,<3.13"
pip = "*"
numpy = ">=1.20"
scipy = ">=1.7"
pymatgen = "*"
ase = ">=3.22"
typing-extensions = "*"
mcp = "*"
pymupdf = "*"  # PyMuPDF; fitz module for paper_downloader + PDF-parsing skills
pytest = "*"  # Required for running the test suite
anyio = "*"
feedparser = "*"
jsonschema = "*"
openai = "*"
plotly = "*"
psutil = "*"
python-dotenv = "*"
python-pptx = "*"
requests = "*"
scikit-image = "*"
tomli = "*"

[feature.core.pypi-dependencies]
optimade = { version = "*", extras = ["client"] }
atomistic-skills = { path = ".", editable = true }
jinja2 = ">=3.0"
pyyaml = ">=6.0"
google-api-python-client = "*"
pubchempy = "*"
tomli-w = "*"


# =============================================================================
# LAYER 1 — DOMAIN BASES  (each ~0.1–5 GB added on top of core)
# =============================================================================

# --- base-chem: molecular chemistry (rdkit, packmol) ---
# + ~0.5 GB
[feature.base-chem.dependencies]
rdkit = "*"
packmol = "*"

# --- base-dft: DFT input generation and output parsing ---
# + ~0.1 GB (just seekpath; pymatgen+ase already in core)
[feature.base-dft.dependencies]
seekpath = "*"  # k-path generation for QE/CP2K band structure

# --- base-ml: PyTorch CUDA for MLIP ---
# + ~5 GB
[feature.base-ml]
platforms = ["linux-64"]
channels = ["nvidia", "pytorch", "conda-forge"]

[feature.base-ml.system-requirements]
cuda = "12"

[feature.base-ml.dependencies]
pytorch = { version = ">=2.0", build = "*cuda*" }
cuda-toolkit = "*"

# --- base-md: MD trajectory analysis ---
# + ~0.3 GB
[feature.base-md.dependencies]
h5py = "*"
# Note: base-chem (rdkit+packmol) is assumed for MD environments that need
# molecular building.  Atomic-only MD (LAMMPS) doesn't need it.


# =============================================================================
# LAYER 2 — COMPUTATIONAL ENGINES
# =============================================================================

# -------------------------------------------------------------------
# DFT Engines
# -------------------------------------------------------------------

# --- engine-orca: molecular DFT via ORCA + SCINE/ReaDuct ---
# + ~1 GB; platforms: linux-64, osx-64
[feature.engine-orca]
platforms = ["linux-64", "osx-64"]

[feature.engine-orca.dependencies]
python = ">=3.11,<3.12"
scine-utilities-python = "*"
scine-readuct-python = "*"

[feature.engine-orca.pypi-dependencies]
numpy = "<2"  # SCINE compatibility

# --- engine-vasp: periodic DFT via Atomate2 (VASP workflows) ---
# + ~2 GB; python 3.10 only
[feature.engine-vasp.dependencies]
python = ">=3.10,<3.11"
rich = "<15"  # jobflow-remote requires rich<15

[feature.engine-vasp.pypi-dependencies]
atomate2 = "*"
jobflow-remote = "*"
amset = "*"
lobsterpy = "*"
ijson = "*"
jobflow = "*"

# --- engine-cp2k: periodic DFT via CP2K ---
# + ~1 GB (cp2k binary); python 3.11–3.12
# ase and pymatgen inherited from core; not re-declared here.
[feature.engine-cp2k.dependencies]
python = ">=3.11,<3.12"
cp2k = "*"

[feature.engine-cp2k.pypi-dependencies]
# cp2k-input-tools provides robust CP2K input parsing/generation.
# If unavailable in the current PyPI mirror, fall back to ASE's built-in
# cp2k tools (ase.calculators.cp2k / ase.io.cp2k).
# cp2k-input-tools = "*"

# --- engine-qe: periodic DFT via Quantum ESPRESSO ---
# + ~1 GB (qe binary); python 3.11–3.12
# ase and pymatgen inherited from core; not re-declared here.
[feature.engine-qe.dependencies]
python = ">=3.11,<3.12"
qe = "*"

# -------------------------------------------------------------------
# MLIP Engines
# -------------------------------------------------------------------

# --- engine-mace: MACE MLIP ---
# + ~3 GB
# Torch is expected from base-ml (CUDA).  Without base-ml, mace-torch pulls
# torch from PyPI (CPU-only), which is functional but much slower for MLIP work.
[feature.engine-mace.dependencies]
# setuptools <70 required by mace-torch 0.3.15
setuptools = "<70"

[feature.engine-mace.pypi-dependencies]
mace-torch = "==0.3.15"
sella = "*"
matcalc = "*"
# Also pinned via conda above; both channels need the constraint.
setuptools = "<70"
nvalchemi-toolkit = "*"  # NVIDIA ALCHEMI Toolkit for GPU batched inference

# --- engine-matgl: MatGL (CHGNet, M3GNet, TensorNet) ---
# + ~2 GB
[feature.engine-matgl.pypi-dependencies]
matgl = "*"
matcalc = "*"
cython = "*"
nvalchemi-toolkit = "*"

# --- engine-fairchem: FairChem (UMA/ESEN) ---
# + ~5 GB
# pytorch (CUDA) is declared here independently so this feature can also
# function without base-ml, but base-ml is still used in production envs.
[feature.engine-fairchem.dependencies]
numpy = "<2.5"  # fairchem-core>=2.18.0 requires numpy>=2.0,<2.5
setuptools = "<70"
pytorch = { version = ">=2.0,<2.9", build = "*cuda*" }
antlr4-python3-runtime = "==4.9.3"

[feature.engine-fairchem.pypi-dependencies]
fairchem-core = ">=2.18.0"
matcalc = "*"
# Also pinned via conda above; both channels need the constraint.
setuptools = "<70"
nvalchemi-toolkit = "*"

# -------------------------------------------------------------------
# MD Engines
# -------------------------------------------------------------------

# --- engine-lammps-cpu: conda-forge LAMMPS (CPU) ---
# + ~2 GB
[feature.engine-lammps-cpu.dependencies]
lammps = "*"

# --- engine-lammps-cuda: conda-forge LAMMPS with Kokkos+CUDA ---
# + ~3 GB; linux-64 only
[feature.engine-lammps-cuda]
platforms = ["linux-64"]

[feature.engine-lammps-cuda.system-requirements]
cuda = "12"

[feature.engine-lammps-cuda.dependencies]
lammps = { version = "*", build = "*cuda*" }

# --- engine-lammps-mace-build: build tools for ACEsuit/lammps fork ---
# + ~2 GB (build tools only; actual lammps binary compiled from source)
[feature.engine-lammps-mace-build]
platforms = ["linux-64"]

[feature.engine-lammps-mace-build.dependencies]
cmake = "*"
gxx = "*"
openmpi = "*"
mkl-devel = "*"

# --- engine-fairchem-lammps: pip package providing lmp_fc binary ---
# Pairs with engine-lammps-cpu
[feature.engine-fairchem-lammps.pypi-dependencies]
fairchem-lammps = "*"
fairchem-core = { version = ">=2.18.0", extras = ["extras"] }

# --- engine-openmm: OpenMM-based MD for drug discovery ---
# + ~3 GB
[feature.engine-openmm.dependencies]
openmm = "*"
openmmforcefields = "*"
ambertools = "*"
parmed = "*"

[feature.engine-openmm.pypi-dependencies]
openff-toolkit = "*"
prolif = "*"
matplotlib = "*"

# -------------------------------------------------------------------
# Generative Engines
# -------------------------------------------------------------------

# --- engine-diffcsp: DiffCSP++ crystal structure generation ---
# + ~2 GB
[feature.engine-diffcsp.dependencies]
hydra-core = ">=1.3.1,<1.4"
omegaconf = "==2.3.0"

[feature.engine-diffcsp.pypi-dependencies]
pytorch-lightning = ">=2.0"
wandb = "*"
pyxtal = "*"
torchdiffeq = "*"
smact = "*"
matminer = "*"
einops = "*"
pytorch-geometric = "*"

# --- engine-mattergen: MatterGen diffusion-based material generation ---
# + ~5 GB; strict CUDA 11.8 / Python 3.10 requirement
[feature.engine-mattergen]
channels = ["pytorch", "nvidia", "conda-forge"]
channel-priority = "disabled"

[feature.engine-mattergen.system-requirements]
cuda = "11.8"

[feature.engine-mattergen.dependencies]
python = "3.10.*"
numpy = "<2"
monty = "==2024.7.30"
matplotlib = "==3.8.4"
hydra-core = "==1.3.1"
cuda-toolkit = "==11.8"

[feature.engine-mattergen.pypi-dependencies]
torch = "==2.2.1+cu118"
mattergen = "*"

[feature.engine-mattergen.activation.env]
CONDA_OVERRIDE_CUDA = "11.8"

# --- engine-adit: ADiT all-atom diffusion transformer ---
# + ~3 GB; minimal feature — most deps installed from source.
# ADiT has no packages on conda-forge or PyPI; the model weights and
# inference code are cloned and installed manually at runtime.
# This feature exists mainly as an environment anchor for script defaults.
[feature.engine-adit]

# --- engine-reactot: React-OT transition state generation ---
# + ~1 GB
[feature.engine-reactot.dependencies]
python = "==3.10.14"
numpy = "==1.26.4"
pytest = "*"

# --- engine-scd: SelfConditionedDenoisingAtoms property prediction ---
# + ~3 GB
[feature.engine-scd.dependencies]
git = "*"

[feature.engine-scd.pypi-dependencies]
lightning-utilities = "*"
scikit-learn = ">=1.0"
pandas = ">=1.3"
datasets = ">=2.0"
huggingface-hub = ">=0.10"
fastmcp = "*"
pytorch-geometric = "*"

# -------------------------------------------------------------------
# Special Engines
# -------------------------------------------------------------------

# --- engine-smol: cluster expansion + Monte Carlo ---
# + ~1 GB
[feature.engine-smol.pypi-dependencies]
smol = "*"
polytope = "*"
scikit-learn = "*"
pyyaml = "*"

# --- engine-calphad: CALPHAD phase diagrams ---
# + ~2 GB
[feature.engine-calphad.dependencies]
numpy = "*"
scipy = "*"
matplotlib = "*"
pandas = "*"
xarray = "*"
tinydb = "*"
sympy = "*"
jupyter = "*"
ipython = "*"

[feature.engine-calphad.pypi-dependencies]
pycalphad = "*"

# --- engine-phasefield: Cahn-Hilliard / Allen-Cahn (FiPy) ---
# + ~1 GB
[feature.engine-phasefield.dependencies]
fipy = "*"
imageio = "*"
tqdm = "*"

# --- engine-drugdisc: drug discovery tools ---
# + ~3 GB
[feature.engine-drugdisc.dependencies]
vina = "*"
pdbfixer = "*"
fpocket = "*"
rdkit = "<2026"
pymol-open-source = "*"

[feature.engine-drugdisc.pypi-dependencies]
meeko = "*"
gemmi = "*"
openbabel-wheel = "*"
biopython = "*"
dimorphite_dl = "*"
posebusters = "*"
MDAnalysis = "*"
rxn4chemistry = "*"

# --- engine-nmr: NMR spectrum prediction ---
# + ~2 GB
[feature.engine-nmr.dependencies]
rdkit = "*"
numpy = "<2.5"

[feature.engine-nmr.pypi-dependencies]
nmrsim = ">=0.6.0.post1"
opencv-python-headless = ">=4.8"
Pillow = ">=10.0"
numba = ">=0.60"
llvmlite = ">=0.43.0"
jcamp = "*"

# --- engine-msms: MS/MS spectrum prediction (ICEBERG) ---
# + ~3 GB; python 3.10 only
[feature.engine-msms.dependencies]
python = "==3.10"
cython = "*"
rdkit = "*"
python-graphviz = "*"
pygraphviz = "*"
pytorch = "==2.4.0"
einops = "*"
seaborn = "*"
h5py = "*"

[feature.engine-msms.pypi-dependencies]
ray = { version = "==2.7.2", extras = ["tune"] }
pygmtools = "*"
msbuddy = "*"
lightgbm = "*"
CairoSVG = "*"

# --- engine-void: porous materials docking ---
# + ~1 GB; VOID installed manually via `pixi run install-void`
[feature.engine-void.dependencies]
numpy = "*"
scikit-learn = "*"
networkx = "*"
rdkit = "*"
zeopp-lsmo = "*"
pydantic = "*"

# --- engine-xrd: X-ray diffraction ---
# + ~0.5 GB
# dara-xrd cannot be installed here because it conflicts with
# reaction-network's numpy pin (<2.5).  Install it manually inside
# the xrd environment when needed:
#   pixi run -e xrd pip install dara-xrd
[feature.engine-xrd.dependencies]

[feature.engine-xrd.pypi-dependencies]
# dara-xrd = "*"  -- manual install only; see comment above


# =============================================================================
# LAYER 3 — PROPERTY TOOLS  (optional add-ons, ~0.1–0.5 GB each)
# =============================================================================

# --- feat-phonon: phonopy for vibrational analysis ---
[feature.feat-phonon.dependencies]
phonopy = "*"

# --- feat-diffusion: pymatgen-analysis-diffusion ---
[feature.feat-diffusion.pypi-dependencies]
pymatgen-analysis-diffusion = "*"

# --- feat-reaction: reaction-network for synthesis prediction ---
[feature.feat-reaction.dependencies]
numpy = "<2.5"

[feature.feat-reaction.pypi-dependencies]
reaction-network = ">=6.1.1,<9"

# --- feat-mp: Materials Project API + MPContribs ---
[feature.feat-mp.pypi-dependencies]
mp-api = "*"
mpcontribs-client = "*"

# --- feat-viz: pymatviz for visualization ---
[feature.feat-viz.pypi-dependencies]
pymatviz = "*"

# --- feat-misc: beautifulsoup4 + other small analysis utilities ---
[feature.feat-misc.dependencies]
beautifulsoup4 = "*"


# =============================================================================
# LAYER 4 — ENVIRONMENTS
#
# Disk estimates are APPROXIMATE and include all transitive dependencies.
# "base" column counts from core upward; total = base + engine + feats.
# =============================================================================

# ═══════════════════════════════════════════════════════════════
# CORE — lightweight, for slurm submission and data processing
# ═══════════════════════════════════════════════════════════════

# --- supercomputing: slurm MCP server on login node ---
# Disk: ~3 GB.  No CUDA, no MLIP, no DFT software.
# Use this for ALL *_via_slurm MCP tools.
[environments.supercomputing]
features = ["core", "base-chem", "base-dft", "feat-misc"]

# --- base: general-purpose research (same as supercomputing + analysis tools) ---
# Disk: ~3.5 GB
[environments.base]
features = ["core", "base-chem", "feat-phonon", "feat-misc"]

# ═══════════════════════════════════════════════════════════════
# MLIP — machine learning interatomic potentials
# ═══════════════════════════════════════════════════════════════

# --- mace: MACE MLIP with CUDA ---
# Disk: ~12 GB.  GPU required for reasonable performance.
[environments.mace]
features = ["core", "base-chem", "base-ml", "engine-mace", "base-md",
            "feat-phonon", "feat-diffusion", "feat-mp", "feat-viz"]
solve-group = "mlip-cuda"

# --- matgl: MatGL (CHGNet/M3GNet/TensorNet) with CPU PyTorch ---
# Disk: ~10 GB
[environments.matgl]
features = ["core", "base-chem", "engine-matgl", "base-md",
            "feat-phonon", "feat-diffusion", "feat-mp", "feat-viz"]
solve-group = "mlip-base"

# --- fairchem: FairChem (UMA/ESEN) with CUDA ---
# Disk: ~15 GB
[environments.fairchem]
features = ["core", "base-chem", "base-ml", "engine-fairchem", "base-md",
            "feat-phonon", "feat-diffusion", "feat-mp", "feat-viz"]
solve-group = "fairchem-cuda"

# ═══════════════════════════════════════════════════════════════
# DFT — first-principles calculations
# ═══════════════════════════════════════════════════════════════

# --- orca: molecular DFT via ORCA + SCINE ---
# Disk: ~6 GB.  ORCA binary must be installed separately (not on conda-forge).
# Platforms: linux-64, osx-64
[environments.orca]
features = ["core", "base-chem", "base-dft", "engine-orca",
            "feat-phonon", "feat-misc"]

# --- vasp: periodic DFT via Atomate2 (VASP) ---
# Disk: ~8 GB.  VASP license + binary required separately.
# Python 3.10 only.
[environments.vasp]
features = ["core", "base-chem", "base-dft", "engine-vasp",
            "feat-phonon", "feat-diffusion", "feat-mp", "feat-reaction"]

# --- cp2k: periodic DFT via CP2K ---
# Disk: ~6 GB.  Fully open-source. Python 3.11–3.12.
[environments.cp2k]
features = ["core", "base-chem", "base-dft", "engine-cp2k",
            "feat-phonon", "feat-diffusion", "feat-misc"]

# --- qe: periodic DFT via Quantum ESPRESSO ---
# Disk: ~6 GB.  Fully open-source. Python 3.11–3.12.
[environments.qe]
features = ["core", "base-chem", "base-dft", "engine-qe",
            "feat-phonon", "feat-diffusion", "feat-misc"]

# ═══════════════════════════════════════════════════════════════
# MD — molecular dynamics
# ═══════════════════════════════════════════════════════════════

# --- mace-lammps: MACE + LAMMPS (ACEsuit fork, compiled from source) ---
# Disk: ~15 GB
[environments.mace-lammps]
features = ["core", "base-chem", "base-ml", "engine-mace",
            "engine-lammps-mace-build", "base-md", "feat-phonon", "feat-diffusion"]
solve-group = "mlip-cuda"

# --- matgl-lammps: MatGL + LAMMPS-Kokkos-CUDA (conda-forge) ---
# Disk: ~13 GB
[environments.matgl-lammps]
features = ["core", "base-chem", "engine-matgl", "engine-lammps-cuda",
            "base-md", "feat-phonon", "feat-diffusion"]
solve-group = "mlip-base"

# --- fairchem-lammps: FairChem + LAMMPS + fairchem-lammps ---
# Disk: ~18 GB
[environments.fairchem-lammps]
features = ["core", "base-chem", "base-ml", "engine-fairchem",
            "engine-lammps-cpu", "engine-fairchem-lammps", "base-md",
            "feat-phonon", "feat-diffusion"]
solve-group = "fairchem-cuda"

# ═══════════════════════════════════════════════════════════════
# GENERATIVE — structure generation models
# ═══════════════════════════════════════════════════════════════

# --- diffcsp: DiffCSP++ crystal generation ---
# Disk: ~10 GB
[environments.diffcsp]
features = ["core", "engine-diffcsp"]

# --- mattergen: MatterGen diffusion-based generation ---
# Disk: ~15 GB. Strict CUDA 11.8 / Python 3.10.
[environments.mattergen]
features = ["core", "engine-mattergen"]

# --- adit: ADiT all-atom diffusion transformer ---
# Disk: ~8 GB
[environments.adit]
features = ["core", "engine-adit"]

# --- react-ot: React-OT transition state generation ---
# Disk: ~4 GB
[environments.react-ot]
features = ["core", "engine-reactot"]

# --- scd: SelfConditionedDenoisingAtoms property prediction ---
# Disk: ~10 GB
[environments.scd]
features = ["core", "engine-scd"]

# ═══════════════════════════════════════════════════════════════
# SPECIALIZED — thermodynamics, phase field, cluster expansion
# ═══════════════════════════════════════════════════════════════

# --- smol: cluster expansion + Monte Carlo ---
# Disk: ~4 GB
[environments.smol]
features = ["core", "base-chem", "engine-smol"]

# --- calphad: CALPHAD phase diagrams ---
# Disk: ~5 GB
[environments.calphad]
features = ["core", "engine-calphad"]

# --- phasefield: Cahn-Hilliard / Allen-Cahn (FiPy) ---
# Disk: ~4 GB
[environments.phasefield]
features = ["core", "engine-phasefield"]

# ═══════════════════════════════════════════════════════════════
# DRUG DISCOVERY
# ═══════════════════════════════════════════════════════════════

# --- drugdisc: drug discovery (docking, ADMET, fingerprints) ---
# Disk: ~6 GB
[environments.drugdisc]
features = ["core", "base-chem", "engine-drugdisc"]

# --- drugmd: drugdisc + OpenMM MD ---
# Disk: ~10 GB
[environments.drugmd]
features = ["core", "base-chem", "engine-drugdisc", "engine-openmm"]

# ═══════════════════════════════════════════════════════════════
# SPECTROSCOPY
# ═══════════════════════════════════════════════════════════════

# --- nmr: NMR prediction/analysis ---
# Disk: ~5 GB
[environments.nmr]
features = ["core", "base-chem", "engine-nmr"]

# --- msms: MS/MS prediction (ICEBERG) ---
# Disk: ~8 GB. Python 3.10 only.
[environments.msms]
features = ["core", "base-chem", "engine-msms"]

# ═══════════════════════════════════════════════════════════════
# MATERIALS ANALYSIS
# ═══════════════════════════════════════════════════════════════

# --- xrd: X-ray diffraction (DARA) ---
# Disk: ~4 GB
[environments.xrd]
features = ["core", "base-chem", "engine-xrd"]

# --- void: porous materials docking (VOID) ---
# Disk: ~5 GB
[environments.void]
features = ["core", "base-chem", "engine-void"]


# =============================================================================
# TASKS
# =============================================================================

# Common tasks
[tasks.install]
description = "Install all environments"
cmd = "pixi install"

[tasks.test-base]
description = "Run base server tests"
cmd = "pytest tests/base/"
default-environment = "base"

# MLIP tasks
[tasks.test-mace]
description = "Run MACE server tests"
cmd = "pytest tests/mace/"
default-environment = "mace"

[tasks.test-matgl]
description = "Run MatGL server tests"
cmd = "pytest tests/matgl/"
default-environment = "matgl"

[tasks.test-fairchem]
description = "Run FairChem server tests"
cmd = "pytest tests/fairchem/"
default-environment = "fairchem"

# DFT tasks
[tasks.test-atomate2]
description = "Run Atomate2 server tests"
cmd = "pytest tests/atomate2/"
default-environment = "vasp"

# MACE LAMMPS build task
# Compiles ACEsuit/lammps fork with PKG_ML-MACE into the mace-lammps environment.
# Output: $CONDA_PREFIX/bin/lmp (usable only within mace-lammps environment)
[tasks.build-lammps-mace]
description = "Build LAMMPS with MACE pair_style from ACEsuit fork"
cmd = """
set -euo pipefail

LAMMPS_GIT_URL="${LAMMPS_GIT_URL:-https://github.com/ACEsuit/lammps.git}"
LAMMPS_REF="${LAMMPS_REF:-mace}"
LAMMPS_BUILD_JOBS="${LAMMPS_BUILD_JOBS:-16}"
BUILD_DIR="${PIXI_PROJECT_ROOT}/.pixi/build/lammps-mace"

PYTHON_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')"
TORCH_CMAKE_PREFIX="$(python -c 'import torch; print(torch.utils.cmake_prefix_path)')"

if [ -z "$TORCH_CMAKE_PREFIX" ]; then
  echo "ERROR: Torch CMake prefix not found. Is pytorch installed?" >&2
  exit 1
fi

mkdir -p "$BUILD_DIR"

if [ ! -d "$BUILD_DIR/src/.git" ]; then
  echo "Cloning ACEsuit/lammps (ref=$LAMMPS_REF)..."
  git clone --branch "$LAMMPS_REF" --depth 1 "$LAMMPS_GIT_URL" "$BUILD_DIR/src"
else
  echo "Using existing clone at $BUILD_DIR/src"
fi

echo "Configuring CMake..."
cmake -S "$BUILD_DIR/src/cmake" \
  -B "$BUILD_DIR/build" \
  -D CMAKE_BUILD_TYPE=Release \
  -D BUILD_MPI=ON \
  -D BUILD_OMP=ON \
  -D PKG_OPENMP=ON \
  -D PKG_ML-MACE=ON \
  -D CMAKE_CXX_STANDARD=17 \
  -D CMAKE_CXX_COMPILER=mpicxx \
  -D Python_EXECUTABLE="$PYTHON_EXECUTABLE" \
  -D CMAKE_PREFIX_PATH="$TORCH_CMAKE_PREFIX;$CONDA_PREFIX" \
  -D MKL_ROOT="$CONDA_PREFIX"

echo "Building ($LAMMPS_BUILD_JOBS jobs)..."
cmake --build "$BUILD_DIR/build" -j "$LAMMPS_BUILD_JOBS"

LMP_BIN="$BUILD_DIR/build/lmp"
LMP_HELP="$("$LMP_BIN" -h 2>&1 || true)"
if echo "$LMP_HELP" | grep -q "ML-MACE"; then
  echo "OK: ML-MACE detected in lmp -h output"
else
  echo "ERROR: ML-MACE not detected in lmp -h output" >&2
  exit 1
fi

cp "$LMP_BIN" "$CONDA_PREFIX/bin/lmp"
echo "Done: $CONDA_PREFIX/bin/lmp"
"""
default-environment = "mace-lammps"

# React-OT: Transition state structure generation
[tasks.install-react-ot]
description = "Install react-ot with required patches"
cmd = """
set -euo pipefail
REACT_OT_REPO="${REACT_OT_REPO:-https://github.com/deepprinciple/react-ot.git}"
REACT_OT_REF="${REACT_OT_REF:-main}"
BUILD_DIR="${PIXI_PROJECT_ROOT}/.pixi/build/react-ot"
PATCH_SCRIPT="${PIXI_PROJECT_ROOT}/.agents/patches/react-ot/apply_patches.sh"

if [ ! -f "$PATCH_SCRIPT" ]; then
  echo "ERROR: Patch script not found: $PATCH_SCRIPT"
  exit 1
fi

if [ -d "$BUILD_DIR/.git" ]; then
  echo "Using existing clone at $BUILD_DIR"
else
  echo "Cloning react-ot (ref=$REACT_OT_REF)..."
  git clone --branch "$REACT_OT_REF" --depth 1 "$REACT_OT_REPO" "$BUILD_DIR"
fi

echo "Applying patches..."
bash "$PATCH_SCRIPT" "$BUILD_DIR"
echo "Installing..."
pixi run -e react-ot pip install --no-deps "$BUILD_DIR"
echo "Done: react-ot installed"
"""
default-environment = "react-ot"

# VOID fallback task
[tasks.install-void]
description = "Install VOID manually (fallback if pixi git dep fails)"
cmd = """
set -euo pipefail
VOID_REPO="${VOID_REPO:-https://github.com/learningmatter-mit/VOID.git}"
VOID_REF="${VOID_REF:-main}"
BUILD_DIR="${PIXI_PROJECT_ROOT}/.pixi/build/void"

if [ -d "$BUILD_DIR/.git" ]; then
  echo "Using existing clone at $BUILD_DIR"
else
  echo "Cloning VOID (ref=$VOID_REF)..."
  git clone --branch "$VOID_REF" --depth 1 "$VOID_REPO" "$BUILD_DIR"
fi

echo "Installing..."
pixi run -e void pip install --no-deps "$BUILD_DIR"
echo "Done: VOID installed"
"""
default-environment = "void"

# SCD: SelfConditionedDenoisingAtoms with TorchMD kernel
[tasks.install-scd]
description = "Install SelfConditionedDenoisingAtoms with TorchMD kernel"
cmd = """
set -euo pipefail
SCD_REPO="${SCD_REPO:-https://github.com/robinweber/SelfConditionedDenoisingAtoms.git}"
SCD_REF="${SCD_REF:-main}"
BUILD_DIR="${PIXI_PROJECT_ROOT}/.pixi/build/scd"

if [ -d "$BUILD_DIR/.git" ]; then
  echo "Using existing clone at $BUILD_DIR"
else
  echo "Cloning SCD (ref=$SCD_REF)..."
  git clone --branch "$SCD_REF" --depth 1 "$SCD_REPO" "$BUILD_DIR"
fi

echo "Installing dependencies..."
pixi run -e scd pip install -r "$BUILD_DIR/requirements.txt"
echo "Installing SCD..."
pixi run -e scd pip install --no-deps "$BUILD_DIR"
echo "Building TorchMD C++ extension..."
cd "$BUILD_DIR/torchmd"
pixi run -e scd python setup.py build_ext --inplace
echo "Done: SCD installed with TorchMD kernel"
"""
default-environment = "scd"

# ms-pred (ICEBERG): MS/MS spectrum prediction
[tasks.install-msms-iceberg]
description = "Install ms-pred (ICEBERG) with patched setup.py"
cmd = """
set -euo pipefail
MS_PRED_REPO="${MS_PRED_REPO:-https://github.com/coleygroup/ms-pred.git}"
MS_PRED_REF="${MS_PRED_REF:-main}"
BUILD_DIR="${PIXI_PROJECT_ROOT}/.pixi/build/ms-pred"
PATCH_FILE="${PIXI_PROJECT_ROOT}/.agents/patches/msms-iceberg/setup_patch.py"

if [ ! -f "$PATCH_FILE" ]; then
  echo "ERROR: Patch file not found: $PATCH_FILE"
  exit 1
fi

if [ -d "$BUILD_DIR/.git" ]; then
  echo "Using existing clone at $BUILD_DIR"
else
  echo "Cloning ms-pred (ref=$MS_PRED_REF)..."
  git clone --branch "$MS_PRED_REF" --depth 1 "$MS_PRED_REPO" "$BUILD_DIR"
fi

echo "Applying setup.py patch..."
cp "$PATCH_FILE" "$BUILD_DIR/setup.py"
echo "Installing ms-pred..."
pixi run -e msms pip install --no-deps "$BUILD_DIR"
echo "Done: ms-pred installed"
"""
default-environment = "msms"

# PyG packages for ARM/aarch64 systems (MatterGen)
[tasks.install-pyg-aarch64]
description = "Install PyG packages for ARM/aarch64"
cmd = """
set -euo pipefail
echo "Installing PyG packages for ARM/aarch64..."
export CUDA_HOME="${CUDA_HOME:-/usr/local/cuda}"
export PATH="$CUDA_HOME/bin:$PATH"
export LD_LIBRARY_PATH="$CUDA_HOME/lib64:$LD_LIBRARY_PATH"
echo "CUDA_HOME=$CUDA_HOME"
nvcc --version || echo "nvcc not found, CUDA may not be installed"
echo "Installing torch-scatter..."
pixi run -e mattergen pip install git+https://github.com/rusty1s/pytorch_scatter.git --no-cache-dir
echo "Installing torch-cluster..."
pixi run -e mattergen pip install git+https://github.com/rusty1s/pytorch_cluster.git --no-cache-dir
echo "Installing torch-sparse..."
pixi run -e mattergen pip install git+https://github.com/rusty1s/pytorch_sparse.git --no-cache-dir || echo "torch-sparse failed"
echo "Verifying..."
pixi run -e mattergen python -c "import torch_scatter; print('torch-scatter:', torch_scatter.__version__)"
echo "Done: PyG packages installed for ARM"
"""
default-environment = "mattergen"


# =============================================================================
# ACTIVATION SCRIPTS
# =============================================================================

[feature.engine-mace.activation.env]
MACE_BACKEND = "torch"

[feature.base-ml.activation.env]
# Allow environments to run on CPU-only hosts by overriding CUDA virtual package
CONDA_OVERRIDE_CUDA = "12"
CUDA_LAUNCH_BLOCKING = "1"
TORCH_USE_CUDA_DSA = "1"